<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The World of Samuel Pepys · A Network Over Time</title>
<!-- Stamp the theme before first paint so the page never flashes the wrong one. -->
<script>
  (function () {
    var saved = null;
    try { saved = localStorage.getItem("pepys-theme"); } catch (e) {}
    var osLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
    document.documentElement.dataset.theme = saved || (osLight ? "light" : "dark");
  })();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="title-block">
      <h1>Samuel Pepys' Network</h1>
      <p class="subtitle">An interactive visualization of the growth of his personal network over time.</p>
    </div>
    <div class="topbar-right">
      <div id="stats">
        <div class="stat"><span class="num" id="stat-date">&mdash;</span><span class="lbl">Date</span></div>
        <div class="stat"><span class="num" id="stat-people">0</span><span class="lbl">People</span></div>
        <div class="stat"><span class="num" id="stat-links">0</span><span class="lbl">Connections</span></div>
        <div class="stat"><span class="num" id="stat-groups">0</span><span class="lbl">Gatherings</span></div>
      </div>
      <button id="theme-toggle" title="Switch between light and dark">
        <span class="to-light">&#9728;</span><span class="to-dark">&#9790;</span>
      </button>
    </div>
  </header>

  <main id="stage">
    <svg id="graph"></svg>
    <div id="modebar">
      <span class="mode-label">View</span>
      <div class="seg">
        <button id="mode-people" class="mode-btn active">People</button>
        <button id="mode-two" class="mode-btn">People + Events</button>
      </div>
    </div>
    <div id="legend">
      <div class="legend-title">First appears in</div>
      <div class="legend-row"><span class="sw year-1"></span>1664</div>
      <div class="legend-row"><span class="sw year-2"></span>1665</div>
      <div class="legend-row"><span class="sw year-3"></span>1666</div>
      <div class="legend-row"><span class="sw year-4"></span>1667</div>
      <div class="legend-row" id="legend-event"><span class="sw sq event"></span>Gathering (event)</div>
    </div>
    <div id="leaderboard">
      <div class="lb-title" id="lb-title">Most connected</div>
      <ol class="lb-list" id="lb-list"></ol>
    </div>
    <div id="hint">Press <strong>Play</strong> or drag the slider to watch the network form.</div>
    <div id="tooltip" class="hidden"></div>
  </main>

  <section id="chapters">
    <span class="jump-label">Jump to&nbsp;</span>
    <div id="chapter-buttons"></div>
  </section>

  <footer id="controls">
    <button id="play" class="primary" title="Play / pause">
      <span class="icon-play">&#9654;</span><span class="icon-pause">&#10073;&#10073;</span>
      <span class="btn-text">Play</span>
    </button>
    <button id="reset" title="Back to an empty network">&#8634; Reset</button>
    <div class="slider-wrap">
      <input type="range" id="slider" min="0" max="100" value="0" step="1">
      <div id="ticks"></div>
    </div>
    <label class="knob">
      <span>Spread <b id="spread-val">5&times;</b></span>
      <input type="range" id="spread" class="mini-range" min="1" max="8" step="0.5" value="5">
    </label>
    <label class="speed">
      Speed
      <select id="speed">
        <option value="1">Slow</option>
        <option value="2" selected>Normal</option>
        <option value="4">Fast</option>
        <option value="8">Very fast</option>
      </select>
    </label>
  </footer>
</div>

<script src="theme.js"></script>
<script src="d3.v7.min.js"></script>
<script src="network_data.js"></script>
<script src="app.js"></script>
</body>
</html>
